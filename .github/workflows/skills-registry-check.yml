name: Skills Registry Check

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - ".agents/**"
      - ".github/workflows/skills-registry-check.yml"
  push:
    paths:
      - "AGENTS.md"
      - ".agents/**"
      - ".github/workflows/skills-registry-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-skills-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate skills directory contract
        shell: bash
        run: |
          set -euo pipefail

          ROOT=".agents/ski11s"
          if [[ ! -d "$ROOT" ]]; then
            echo "ERROR: Missing required skills root: $ROOT"
            exit 1
          fi

          mapfile -t skill_dirs < <(find "$ROOT" -mindepth 1 -maxdepth 1 -type d | sort)
          if [[ ${#skill_dirs[@]} -eq 0 ]]; then
            echo "No skill directories found under $ROOT; structure check passed."
            exit 0
          fi

          for dir in "${skill_dirs[@]}"; do
            skill_id="$(basename "$dir")"
            echo "Checking skill: $skill_id"

            if [[ ! -f "$dir/skill.yaml" ]]; then
              echo "ERROR: $dir/skill.yaml is required."
              exit 1
            fi

            if [[ ! -f "$dir/README.md" ]]; then
              echo "ERROR: $dir/README.md is required."
              exit 1
            fi

            for key in name description version; do
              if ! grep -Eq "^[[:space:]]*$key:[[:space:]]*[^[:space:]].*$" "$dir/skill.yaml"; then
                echo "ERROR: $dir/skill.yaml missing required key: $key"
                exit 1
              fi
            done

            if [[ -f "$dir/install.sh" ]] && [[ ! -x "$dir/install.sh" ]]; then
              echo "ERROR: $dir/install.sh exists but is not executable. Commit executable mode (e.g. git update-index --chmod=+x $dir/install.sh)."
              exit 1
            fi
          done

          echo "Skills registry validation passed."
